<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwords</title>
  <link rel="stylesheet" href="passwordPopup.css">
</head>

<body>
  <div class="app-container">
    <!-- Login Screen -->
    <div id="login-screen" class="full-screen-overlay">
      <div class="login-box">
        <h1 id="login-title">Unlock Vault</h1>
        <p>Enter your master password to continue</p>
        <input type="password" id="master-password-input" placeholder="Master Password">
        <button id="unlock-btn" class="primary-btn">Unlock</button>
      </div>
    </div>

    <header>
      <h1>Passwords</h1>
      <div class="header-actions">
        <button id="download-btn" title="Download Decrypted Backup"></button>
        <button id="sync-btn" title="Sync with VPS"></button>
      </div>
    </header>

    <nav>
      <button id="tab-passwords" class="active">Passwords</button>
      <button id="tab-notes">Notes</button>
      <button id="tab-totp">2FA</button>
    </nav>

    <main>
      <div id="search-container">
        <input type="text" id="search-input" placeholder="Search...">
      </div>

      <div id="passwords-section" class="section active">
        <div id="password-list" class="item-list">
          <!-- Passwords will be injected here -->
        </div>
        <button id="add-password-btn" class="fab">+</button>
      </div>

      <div id="notes-section" class="section">
        <div id="notes-list" class="item-list">
          <!-- Notes will be injected here -->
        </div>
        <button id="add-note-btn" class="fab">+</button>
      </div>

      <div id="totp-section" class="section">
        <div id="totp-list" class="item-list">
          <!-- TOTP items will be injected here -->
        </div>
        <button id="add-totp-btn" class="fab">+</button>
      </div>
    </main>

    <!-- Modals -->
    <div id="password-modal" class="modal">
      <div class="modal-content">
        <h2>Add Password</h2>
        <input type="text" id="pw-site" placeholder="Website (e.g. google.com)">
        <input type="text" id="pw-user" placeholder="Username / Email">
        <div class="input-group">
          <input type="password" id="pw-pass" placeholder="Password">
          <button id="generate-pw-btn" title="Generate Secure Password">🎲</button>
        </div>
        <div class="modal-actions">
          <button id="cancel-pw">Cancel</button>
          <button id="save-pw" class="primary">Save</button>
        </div>
      </div>
    </div>

    <div id="note-modal" class="modal">
      <div class="modal-content">
        <h2>Add Note</h2>
        <input type="text" id="note-title" placeholder="Title">
        <textarea id="note-content" placeholder="Content"></textarea>
        <div class="modal-actions">
          <button id="cancel-note">Cancel</button>
          <button id="save-note" class="primary">Save</button>
        </div>
      </div>
    </div>

    <div id="totp-modal" class="modal">
      <div class="modal-content">
        <h2>Add 2FA Token</h2>
        <input type="text" id="totp-issuer" placeholder="Issuer (e.g., Google, GitHub)">
        <input type="text" id="totp-account" placeholder="Account Name (e.g., email)">
        <input type="text" id="totp-secret" placeholder="Secret Key (Base32)">
        <div class="modal-hint">
          Paste the secret key from your authenticator setup, or scan a QR code to get the key.
        </div>
        <div class="modal-actions">
          <button id="cancel-totp">Cancel</button>
          <button id="save-totp" class="primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="icons.js"></script>
  <script src="totp.js"></script>
  <script src="crypto.js"></script>
  <script src="passwordPopup.js"></script>
</body>
</html>
