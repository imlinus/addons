<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIY AdBlock</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-icon">🛡️</div>
      <h1>DIY AdBlock</h1>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="blocked-count">30,000</div>
        <div class="stat-label">Domains Blocked</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="status-indicator">✓</div>
        <div class="stat-label">Protection Active</div>
      </div>
    </div>

    <div class="info-section">
      <h2>Using Merged Blocklists</h2>
      <p>This adblocker combines <strong>Hagezi's Pro Mini</strong> and <strong>Blocklist Project</strong> lists.</p>
      
      <div class="info-grid">
        <div class="info-item">
          <span class="info-icon">🚫</span>
          <span>Ads &amp; Trackers</span>
        </div>
        <div class="info-item">
          <span class="info-icon">🔒</span>
          <span>Malware &amp; Phishing</span>
        </div>
        <div class="info-item">
          <span class="info-icon">📊</span>
          <span>Analytics &amp; Metrics</span>
        </div>
        <div class="info-item">
          <span class="info-icon">💰</span>
          <span>Cryptojacking</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="update-btn" class="btn-primary">
        🔄 Update Blocklist
      </button>
    </div>

    <footer>
      <a href="https://github.com/hagezi/dns-blocklists" target="_blank">
        Powered by Hagezi DNS Blocklists
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
